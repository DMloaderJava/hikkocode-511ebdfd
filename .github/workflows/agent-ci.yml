name: Agent CI - Build & Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present
        continue-on-error: true

      - name: Comment PR on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            if (!pr) return;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: `⚠️ **Build/test failed** on this auto-generated PR.\n\nPlease check the [workflow run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}) for details.\n\n_Auto-comment by hikkocode CI_`
            });

      - name: Label PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            if (!pr) return;
            
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: ['ci-passed', 'auto-generated']
              });
            } catch (e) {
              console.log('Labels may not exist yet:', e.message);
            }

      - name: Label PR on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            if (!pr) return;
            
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: ['ci-failed', 'auto-generated']
              });
            } catch (e) {
              console.log('Labels may not exist yet:', e.message);
            }
